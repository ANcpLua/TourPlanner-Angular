name: Tests and Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  angular-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Angular tests with coverage
        run: npx ng test --coverage --coverage-reporters cobertura text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/cobertura-coverage.xml
          flags: angular
          fail_ci_if_error: false

  dotnet-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SWEN2.TourPlanner.Angular.sln

      - name: Build
        run: dotnet build SWEN2.TourPlanner.Angular.sln --no-restore --configuration Release

      - name: Install libgdiplus for System.Drawing on Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdiplus

      - name: Run tests with coverage (MTP + coverlet)
        run: |
          ./Test/bin/Release/net10.0/Test \
            --coverlet --coverlet-output-format cobertura \
            --coverlet-output TestResults/coverage.cobertura.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/coverage.cobertura.xml
          flags: dotnet
          fail_ci_if_error: false
