<header class="navbar">
  <div class="navbar__brand">
    <span class="navbar__course">SWEN2</span>
    <span class="navbar__title">TourPlanner Angular</span>
  </div>

  @if (authState.isAuthenticated()) {
    <nav class="navbar__links" aria-label="Primary">
      <a routerLink="/tours" routerLinkActive="navbar__link--active" ariaCurrentWhenActive="page" class="navbar__link">Tours</a>
      <a routerLink="/tour-logs" routerLinkActive="navbar__link--active" ariaCurrentWhenActive="page" class="navbar__link">Tour Logs</a>
      <a routerLink="/reports" routerLinkActive="navbar__link--active" ariaCurrentWhenActive="page" class="navbar__link">Reports</a>
    </nav>

    <div class="navbar__user">
      <span>{{ authState.currentUser()?.email }}</span>
      <button type="button" class="navbar__logout" (click)="logout()">Logout</button>
    </div>
  }
</header>
