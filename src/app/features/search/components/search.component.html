<div class="search">
  <div class="search__bar">
    <input
      type="text"
      placeholder="Search tours…"
      [value]="searchText()"
      (input)="searchTextChange.emit($any($event.target).value)"
      (keydown)="onKeydown($event)"
    />
    <button type="button" (click)="search.emit()" [disabled]="!searchText().trim()">
      Search
    </button>
    @if (hasSearched()) {
      <button type="button" class="search__clear" (click)="clear.emit()">Clear</button>
    }
  </div>

  @if (hasSearched()) {
    <div class="search__results">
      @if (results().length === 0) {
        <p class="search__empty">No tours found.</p>
      } @else {
        @for (tour of results(); track tour.id) {
          <button
            type="button"
            class="search__result"
            (click)="navigateToTour.emit(tour)"
          >
            <strong>{{ tour.name }}</strong>
            <span>{{ tour.from }} → {{ tour.to }}</span>
            <span>{{ tour.distance ?? 0 | number: '1.0-0' }} m</span>
          </button>
        }
      }
    </div>
  }
</div>
